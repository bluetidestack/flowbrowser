  <script>
    const proxyBase = "https://api.allorigins.win/raw?url=";
    const tabs = [];
    let activeTabId = null;
    let tabCounter = 0;
    
    // Initialize the browser with one tab
    document.addEventListener('DOMContentLoaded', () => {
      createNewTab();
      
      // Set up event listeners
    //   document.getElementById('new-tab').addEventListener('click', createNewTab);
    document.getElementById('new-tab').addEventListener('click', () => createNewTab());

      document.getElementById('go-button').addEventListener('click', loadPageInActiveTab);
      document.getElementById('toggle-devtools').addEventListener('click', toggleDevTools);
      document.getElementById('close-devtools').addEventListener('click', closeDevTools);
      document.getElementById('console-input').addEventListener('keydown', handleConsoleInput);
      document.getElementById('inject-js-button').addEventListener('click', injectJavaScript);
      document.getElementById('clear-js-button').addEventListener('click', () => {
        document.getElementById('js-inject-area').value = '';
      });
      document.getElementById('save-js-button').addEventListener('click', saveJavaScriptSnippet);
      document.getElementById('saved-snippets').addEventListener('change', loadSavedSnippet);
      document.getElementById('clear-network-log').addEventListener('click', () => {
        document.getElementById('network-log').innerHTML = 'Network log cleared...';
      });
      document.getElementById('back-button').addEventListener('click', navigateBack);
      document.getElementById('forward-button').addEventListener('click', navigateForward);
      document.getElementById('refresh-button').addEventListener('click', refreshPage);
      
      // Set up devtools tabs
      document.querySelectorAll('.devtools-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
          document.querySelectorAll('.devtools-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.devtools-panel').forEach(p => p.classList.remove('active'));
          
          e.target.classList.add('active');
          const panelId = e.target.dataset.panel;
          document.getElementById(`${panelId}-panel`).classList.add('active');
        });
      });
      
      // Load saved snippets from localStorage
      loadSavedSnippetsFromStorage();
    });
    
    function createNewTab(url = null) {
      const tabId = `tab-${tabCounter++}`;
      
      // Create tab button
      const tabElement = document.createElement('div');
      tabElement.className = 'tab';
      tabElement.dataset.tabId = tabId;
    tabElement.innerHTML = `<div class="tab-title">New Tab</div><span class="tab-close">×</span>`;


      tabElement.addEventListener('click', (e) => {
        if (!e.target.classList.contains('tab-close')) {
          activateTab(tabId);
        }
      });
      
      // Add close button functionality
      const closeButton = tabElement.querySelector('.tab-close');
      closeButton.addEventListener('click', (e) => {
        e.stopPropagation();
        closeTab(tabId);
      });
      
      // Insert tab before the new tab button
      document.getElementById('tab-bar').insertBefore(tabElement, document.getElementById('new-tab'));
      
      // Create iframe container
      const iframeContainer = document.createElement('div');
      iframeContainer.className = 'iframe-container';
      iframeContainer.id = `container-${tabId}`;
      
      const iframe = document.createElement('iframe');
      iframe.id = `iframe-${tabId}`;
      iframe.sandbox = "allow-scripts allow-forms allow-same-origin";
      
      iframeContainer.appendChild(iframe);
      document.getElementById('content').appendChild(iframeContainer);
      
      // Add to tabs array
      tabs.push({
        id: tabId,
        title: 'New Tab',
        url: '',
        history: [],
        currentHistoryIndex: -1
      });
      
      // Activate the new tab
      activateTab(tabId);
      
      // If URL is provided, load it
      if (url) {
        document.getElementById('urlInput').value = url;
        loadPageInActiveTab();
      }

      activateTab(tabId);
        updateTabTitle(tabId, 'New Tab');
      
      updateTabCount();
    }
    
    function activateTab(tabId) {
      // Deactivate all tabs
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.iframe-container').forEach(container => container.classList.remove('active'));
      
      // Activate selected tab
      document.querySelector(`.tab[data-tab-id="${tabId}"]`).classList.add('active');
      document.getElementById(`container-${tabId}`).classList.add('active');
      
      // Update active tab ID
      activeTabId = tabId;
      
      // Update URL input with the active tab's URL
      const tab = tabs.find(t => t.id === tabId);
      if (tab && tab.url) {
        document.getElementById('urlInput').value = tab.url;
      } else {
        document.getElementById('urlInput').value = '';
      }
      
      updateNavigationButtons();
    }
    
    function closeTab(tabId) {
      // Don't close if it's the last tab
      if (tabs.length <= 1) {
        return;
      }
      
      // Remove tab from DOM
      const tabElement = document.querySelector(`.tab[data-tab-id="${tabId}"]`);
      tabElement.remove();
      
      // Remove iframe container
      const container = document.getElementById(`container-${tabId}`);
      container.remove();
      
      // Remove from tabs array
      const tabIndex = tabs.findIndex(t => t.id === tabId);
      tabs.splice(tabIndex, 1);
      
      // If closing the active tab, activate another one
      if (activeTabId === tabId) {
        // Activate the tab to the left, or the first tab if there's none
        const newActiveTab = tabs[Math.max(0, tabIndex - 1)];
        activateTab(newActiveTab.id);
      }
      
      updateTabCount();
    }
    
function updateTabTitle(tabId, title) {
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  
  tab.title = title || 'New Tab';
  const tabElement = document.querySelector(`.tab[data-tab-id="${tabId}"]`);
  if (!tabElement) return;

  let iconUrl = "🌐"; // Default emoji if no icon found
  let domain = "";

  // 1. SAFELY try to extract the domain
  try {
    if (tab.url && tab.url.startsWith('http')) {
      domain = new URL(tab.url).hostname;
    }
  } catch (e) { 
    domain = ""; // Fallback if URL is invalid or just a search term
  }

  // 2. Build the icon HTML (Using Google's Favicon Service)
  let iconHtml = `<span style="margin-right:8px; font-size:14px; flex-shrink:0;">${iconUrl}</span>`;
  
  if (domain) {
    const googleIcon = `https://www.google.com{domain}&sz=32`;
    iconHtml = `
      <img src="${googleIcon}" 
           onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';" 
           onload="this.style.display='inline-block'; this.nextElementSibling.style.display='none';"
           style="display:none; width:16px; height:16px; margin-right:8px; flex-shrink:0; border-radius:2px;">
      <span style="margin-right:8px; font-size:14px; display:inline-block;">🌐</span>
    `;
  }

  // 3. Update the Tab Element UI
  tabElement.innerHTML = `
    <div class="tab-title" style="display:flex; align-items:center; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; pointer-events:none; font-size: 12px;">
      ${iconHtml}
      <span style="overflow:hidden; text-overflow:ellipsis;">${tab.title}</span>
    </div>
    <span class="tab-close" onclick="event.stopPropagation(); closeTab('${tabId}')" style="margin-left:8px; opacity:0.5; font-size:16px; cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;">×</span>
  `;
}

// Server Toggle Logic
document.getElementById('toggle-server').onclick = function() {
  useEmbed = !useEmbed;
  this.innerText = useEmbed ? "Change server (Current: Embed)" : "Change server (Current: Proxy)";
  
  if (activeTabId) {
    const container = document.getElementById(`container-${activeTabId}`);
    const currentViewer = container.querySelector('iframe, embed');
    const currentUrl = document.getElementById('urlInput').value;

    // Create the new element type
    const newViewer = document.createElement(useEmbed ? 'embed' : 'iframe');
    newViewer.id = `iframe-${activeTabId}`; // Keeping ID consistent for your existing functions
    newViewer.style.width = "100%";
    newViewer.style.height = "100%";
    newViewer.style.border = "none";
    
    if (!useEmbed) {
       newViewer.sandbox = "allow-scripts allow-forms allow-same-origin";
    }

    // Swap them out
    container.innerHTML = '';
    container.appendChild(newViewer);
    
    // Trigger reload with new "server" logic
    if (currentUrl) loadPageInActiveTab();
  }
  updateStatus(useEmbed ? "Switched to Direct Embed" : "Switched to AllOrigins Proxy");
};

// Modify your existing createNewTab to respect the setting
const originalCreateTab = createNewTab;
createNewTab = function(url) {
  originalCreateTab(url);
  // Ensure new tabs match current server setting
  const container = document.getElementById(`container-${activeTabId}`);
  if (useEmbed && container.querySelector('iframe')) {
      const embed = document.createElement('embed');
      embed.id = `iframe-${activeTabId}`;
      embed.style.width = "100%";
      embed.style.height = "100%";
      container.innerHTML = '';
      container.appendChild(embed);
  }
};

function prepareUrl(inputStr) {
  inputStr = inputStr.trim();
  if (!inputStr) return null;

  if (looksLikeUrl(inputStr)) {
    if (!/^https?:\/\//i.test(inputStr)) {
      inputStr = "https://" + inputStr;
    }
    return inputStr;
  } else {
    const query = encodeURIComponent(inputStr);
    return `https://mojeek.com/search?q=${query}`;
  }
}

async function loadPageInActiveTab(isNavigating = false) {
  const urlInput = document.getElementById('urlInput');
  const goButton = document.getElementById('go-button');
  
  if (!activeTabId) return;

  let rawInput = urlInput.value.trim();
  if (!rawInput) return;

  const target = prepareUrl(rawInput);
  urlInput.value = target;
  urlInput.style.opacity = "0.5";
  goButton.innerText = "Wait...";

  const tab = tabs.find(t => t.id === activeTabId);
  const container = document.getElementById(`container-${activeTabId}`);
  let viewer = document.getElementById(`iframe-${activeTabId}`);

  // 1. CREATE THE BLUR OVERLAY
  const loader = document.createElement('div');
  loader.className = 'loading-overlay-dynamic'; // Unique class to avoid conflicts
  loader.style = `
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    z-index: 10000; transition: opacity 0.4s ease;
  `;
  
  loader.innerHTML = `
    <div class="spinner" style="border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #60a5fa; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
    <div style="color: #00ffff; font-family: 'Open Sans'; font-weight: bold; text-align: center; padding: 0 30px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">
      ${getRandomSplash()}
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
  `;
  container.appendChild(loader);

  try {
    updateStatus(`Loading ${target}...`);

    // 2. HISTORY LOGIC
    if (!isNavigating && target !== tab.url) {
      // Remove forward history if navigating to a new place
      tab.history = tab.history.slice(0, tab.currentHistoryIndex + 1);
      tab.history.push(target);
      tab.currentHistoryIndex++;
    }

    if (useEmbed) {
      // DIRECT EMBED MODE
      const newEmbed = document.createElement('embed');
      newEmbed.id = `iframe-${activeTabId}`;
      newEmbed.src = target;
      newEmbed.style.width = "100%";
      newEmbed.style.height = "100%";
      newEmbed.style.border = "none";
      
      container.innerHTML = ''; 
      container.appendChild(newEmbed);
      tab.url = target;
      updateTabTitle(activeTabId, target.replace(/^https?:\/\//i, ''));
    } else {
      // PROXY MODE
      const response = await fetch(proxyBase + encodeURIComponent(target));
      if (!response.ok) throw new Error("Proxy failed to reach site");

      const html = await response.text();
      viewer.srcdoc = injectProxyScript(html, target);
      tab.url = target;
      
      const titleMatch = html.match(/<title[^>]*>(.*?)<\/title>/i);
      updateTabTitle(activeTabId, titleMatch ? titleMatch[1] : target);
    }
    updateStatus("Ready");
  } catch (err) {
    updateStatus("Error");
    const errorHtml = `
      <body style="background:#111; color:#ff5f5f; font-family:'Open Sans', sans-serif; padding:2rem; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; overflow:hidden;">
        <div style="text-align:center; max-width: 400px;">
          <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; color: #fff;">${getRandomError()}</h1>
          <p style="opacity: 0.6; margin-bottom: 1.5rem; font-size: 0.9rem;">Error details: ${err.message} Try opening a new tab and switching the proxy server. You have to click the very top of the button, it's a bad hitbox. Then in the new tab open the same site, or try this try again button.</p>
          <button onclick="window.parent.loadPageInActiveTab(true)" 
                  style="background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); padding:12px 25px; border-radius:12px; font-weight:bold; cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important; transition: 0.2s; backdrop-filter: blur(10px);">
            Try Again
          </button>
        </div>
      </body>`;
    if (useEmbed) {
        container.innerHTML = `<iframe id="iframe-${activeTabId}" srcdoc='${errorHtml}' style="width:100%;height:100%;border:none;"></iframe>`;
    } else {
        viewer.srcdoc = errorHtml;
    }
  } finally {
    // 3. CLEANUP
    loader.style.opacity = '0';
    setTimeout(() => { if(loader.parentNode) loader.remove(); }, 400);
    
    urlInput.style.opacity = "1";
    goButton.innerText = "Go";
    updateNavigationButtons(); // Update the Back/Forward states
  }
}


    
    function injectProxyScript(html, baseUrl) {
      const baseTag = `<base href="${baseUrl}">`;
      const interceptScript = `
        <script>
          // Intercept link clicks
          document.addEventListener('click', e => {
            const a = e.target.closest('a[href]');
            if (a && a.href && a.target !== '_blank') {
              e.preventDefault();
              parent.postMessage({ type: 'navigate', href: a.href }, '*');
            }
          });
          
          // Intercept console methods
          const originalConsole = {
            log: console.log,
            error: console.error,
            warn: console.warn,
            info: console.info
          };
          
          console.log = function(...args) {
            originalConsole.log(...args);
            parent.postMessage({ 
              type: 'console', 
              method: 'log', 
              args: args.map(arg => String(arg))
            }, '*');
          };
          
          console.error = function(...args) {
            originalConsole.error(...args);
            parent.postMessage({ 
              type: 'console', 
              method: 'error', 
              args: args.map(arg => String(arg))
            }, '*');
          };
          
          console.warn = function(...args) {
            originalConsole.warn(...args);
            parent.postMessage({ 
              type: 'console', 
              method: 'warn', 
              args: args.map(arg => String(arg))
            }, '*');
          };
          
          console.info = function(...args) {
            originalConsole.info(...args);
            parent.postMessage({ 
              type: 'console', 
              method: 'info', 
              args: args.map(arg => String(arg))
            }, '*');
          };
          
          // Intercept fetch requests for network panel
          const originalFetch = window.fetch;
          window.fetch = function(resource, init) {
            const url = typeof resource === 'string' ? resource : resource.url;
            parent.postMessage({ 
              type: 'network', 
              method: init?.method || 'GET',
              url: url
            }, '*');
            return originalFetch.apply(this, arguments);
          };
          
          // Intercept XHR for network panel
          const originalXHROpen = XMLHttpRequest.prototype.open;
          XMLHttpRequest.prototype.open = function(method, url) {
            this._method = method;
            this._url = url;
            return originalXHROpen.apply(this, arguments);
          };
          
          const originalXHRSend = XMLHttpRequest.prototype.send;
          XMLHttpRequest.prototype.send = function() {
            parent.postMessage({ 
              type: 'network', 
              method: this._method,
              url: this._url
            }, '*');
            return originalXHRSend.apply(this, arguments);
          };
        <\/script>
      `;
      
      const styleOverride = `
        <style>
          /* Optional: Add any style overrides here */
        </style>
      `;
      
      if (/<head[^>]*>/i.test(html)) {
        return html.replace(/<head[^>]*>/i, match => match + baseTag + interceptScript + styleOverride);
      } else {
        return baseTag + interceptScript + styleOverride + html;
      }
    }

    function handleConsoleInput(e) {
      if (e.key === 'Enter') {
        const input = document.getElementById('console-input');
        const code = input.value;
        
        if (!code.trim()) return;
        
        // Log the input to the console output
        appendToConsole('log', `> ${code}`);
        
        // Execute in the active iframe
        executeInActiveTab(code);
        
        // Clear the input
        input.value = '';
      }
    }
    
    function executeInActiveTab(code) {
      if (!activeTabId) return;
      
      const iframe = document.getElementById(`iframe-${activeTabId}`);
      try {
        // Execute the code in the iframe and get the result
        const result = iframe.contentWindow.eval(`
          try {
            const result = eval(${JSON.stringify(code)});
            if (result !== undefined) {
              console.log(result);
            }
            "SUCCESS";
          } catch (e) {
            console.error(e.message);
            "ERROR: " + e.message;
          }
        `);
        
        if (result && result.startsWith && result.startsWith('ERROR:')) {
          appendToConsole('error', result);
        }
      } catch (e) {
        appendToConsole('error', `Failed to execute: ${e.message}`);
      }
    }
    
    function injectJavaScript() {
      const code = document.getElementById('js-inject-area').value;
      if (!code.trim()) return;
      
      executeInActiveTab(code);
      updateStatus('JavaScript injected');
    }
    
    function appendToConsole(type, message) {
      const consoleOutput = document.getElementById('console-output');
      const line = document.createElement('div');
      line.className = `console-line console-${type}`;
      line.textContent = message;
      consoleOutput.appendChild(line);
      consoleOutput.scrollTop = consoleOutput.scrollHeight;
    }
    
    function saveJavaScriptSnippet() {
      const code = document.getElementById('js-inject-area').value;
      if (!code.trim()) return;
      
      const snippetName = prompt('Enter a name for this snippet:');
      if (!snippetName) return;
      
      // Get existing snippets
      let savedSnippets = JSON.parse(localStorage.getItem('procksiSnippets') || '{}');
      savedSnippets[snippetName] = code;
      
      // Save back to localStorage
      localStorage.setItem('procksiSnippets', JSON.stringify(savedSnippets));
      
      loadSavedSnippetsFromStorage();
      updateStatus(`Snippet "${snippetName}" saved`);
    }
    
    function loadSavedSnippetsFromStorage() {
      const savedSnippets = JSON.parse(localStorage.getItem('procksiSnippets') || '{}');
      const select = document.getElementById('saved-snippets');
      
      while (select.options.length > 1) {
        select.remove(1);
      }
      
      for (const [name, code] of Object.entries(savedSnippets)) {
        const option = document.createElement('option');
        option.value = code;
        option.textContent = name;
        select.appendChild(option);
      }
    }
    
    function loadSavedSnippet(e) {
      const code = e.target.value;
      if (code) {
        document.getElementById('js-inject-area').value = code;
      }
      // Reset the select
      setTimeout(() => {
        e.target.selectedIndex = 0;
      }, 100);
    }
    
    function navigateBack() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab && tab.currentHistoryIndex > 0) {
    tab.currentHistoryIndex--;
    const prevUrl = tab.history[tab.currentHistoryIndex];
    document.getElementById('urlInput').value = prevUrl;
    loadPageInActiveTab(true); // 'true' tells the engine NOT to add a new history entry
  }
}

function navigateForward() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab && tab.currentHistoryIndex < tab.history.length - 1) {
    tab.currentHistoryIndex++;
    const nextUrl = tab.history[tab.currentHistoryIndex];
    document.getElementById('urlInput').value = nextUrl;
    loadPageInActiveTab(true);
  }
}

function refreshPage() {
  loadPageInActiveTab(true); // Simply re-loads the current URL
}

    
    function updateNavigationButtons() {
  const tab = tabs.find(t => t.id === activeTabId);
  const backBtn = document.getElementById('back-button');
  const forwardBtn = document.getElementById('forward-button');

  if (!tab) return;

  // Disable 'Back' if at the start of history
  backBtn.disabled = tab.currentHistoryIndex <= 0;
  backBtn.style.opacity = backBtn.disabled ? "0.3" : "1";

  // Disable 'Forward' if at the end of history
  forwardBtn.disabled = tab.currentHistoryIndex >= tab.history.length - 1;
  forwardBtn.style.opacity = forwardBtn.disabled ? "0.3" : "1";
}

    
    function updateStatus(message) {
      document.getElementById('status-text').textContent = message;
    }
    
    function updateTabCount() {
      document.getElementById('tab-count').textContent = `Tabs: ${tabs.length}`;
    }
    
    window.addEventListener("message", e => {
      if (e.data?.type === "navigate" && e.data.href) {
        document.getElementById('urlInput').value = e.data.href;
        loadPageInActiveTab();
      } else if (e.data?.type === "console") {
        appendToConsole(e.data.method, e.data.args.join(' '));
      } else if (e.data?.type === "network") {
        const networkLog = document.getElementById('network-log');
        const entry = document.createElement('div');
        entry.className = 'console-line';
        entry.textContent = `${e.data.method}: ${e.data.url}`;
        networkLog.appendChild(entry);
        networkLog.scrollTop = networkLog.scrollHeight;
      }
      else if (e.data?.type === "reload") {
        loadPageInActiveTab(); // Re-runs the whole engine when button is clicked
      }
    });
    
    // URL input event
    document.getElementById('urlInput').addEventListener("keydown", e => {
      if (e.key === "Enter") {
        loadPageInActiveTab();
      }
    });
